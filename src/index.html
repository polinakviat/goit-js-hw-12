<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla App Template</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>

    <main>
    </main>

  <!-- Форма з ПРАВИЛЬНИМ класом "form" згідно із завданням -->
  <form class="form">
    <input type="text" name="query" class="search-input" placeholder="Search images..." autocomplete="off" />
    <button type="submit">Search</button>
  </form>
  
  <!-- Головний контейнер галереї -->
  <ul class="gallery"></ul>
  
  <!-- Кнопка Load more, прихована за замовчуванням класом is-hidden -->
  <button type="button" class="load-more-btn is-hidden">Load more</button>
  
  <!-- Лоадер, перенесений під кнопку -->
  <div class="loader is-hidden"></div>


    <script type="module" src="./main.js"></script>
  </body>
</html>
